<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Request Received | Ruya Web Studio</title>  
    <style>  
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }  
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; width: 90%; }  
        h1 { color: #007BFF; margin-bottom: 15px; font-size: 1.8rem; }  
        p { font-size: 1.1rem; line-height: 1.6; color: #666; margin: 12px 0; }  
        .status-footer { margin-top: 30px; font-size: 0.85rem; color: #28a745; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>  
</head>  
<body>  
    <div class="container">  
        <h1>Thank you for your interest!</h1>  
        <p>Ruya Web Studio will now begin working on your custom demo website. We will reach out to you shortly via email with your demo website for your business.</p>  
        
        <div class="status-footer">✓ Request received</div>
    </div>  

    <script>  
    (function() {  
        // Instantly capture parameters from the URL  
        const urlParams = new URLSearchParams(window.location.search);  
        const clientName = urlParams.get('client') || 'Unknown';  
        const bizName = urlParams.get('biz') || 'Unknown';  

        // Fire the tracking fetch instantly to your Google Apps Script  
        const bridgeUrl = "https://script.google.com/macros/s/AKfycbz7isazGEOReQr65y89E9UYO4TQXfbzVO9IEFCneTfG2fwIYmDKuOsVZDlCinzkW3ipsA/exec";  
        
        fetch(`${bridgeUrl}?client=${encodeURIComponent(clientName)}&biz=${encodeURIComponent(bizName)}`, { mode: 'no-cors' })
        .catch(e => console.log("Silent logging fallback"));
    })();  
    </script>
</body>  
</html>
